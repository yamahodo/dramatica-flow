<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dramatica-Flow - AI 小说创作工坊</title>
<style>
:root {
  --bg-dark: #0d1117; --bg: #161b22; --bg2: #1c2333; --bg3: #21293a;
  --surface: #1c2333; --surface2: #242d3f;
  --border: #30363d; --border2: #444c56;
  --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --green: #3fb950; --green-bg: #0d2818;
  --red: #f85149; --red-bg: #2d0f0f;
  --yellow: #d29922; --yellow-bg: #2d2006;
  --blue: #58a6ff; --blue-bg: #0c2d6b;
  --purple: #bc8cff; --purple-bg: #2d1f54;
  --orange: #f0883e; --orange-bg: #2d1a06;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; font-size: 14px; color: var(--text); background: var(--bg-dark); line-height: 1.6; overflow: hidden; height: 100vh; }

/* ── 顶部导航栏 ─────────────────────────────────────────────────────────── */
.topbar { height: 52px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.topbar-brand { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: .02em; }
.topbar-brand span { color: var(--blue); }
.topbar-sep { width: 1px; height: 24px; background: var(--border); }
.book-selector { display: flex; align-items: center; gap: 8px; }
.book-selector select { padding: 5px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; min-width: 160px; cursor: pointer; }
.book-selector select:focus { outline: none; border-color: var(--blue); }
.topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ── 步骤条 ──────────────────────────────────────────────────────────────── */
.steps-bar { position: fixed; top: 52px; left: 0; right: 0; height: 44px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 2px; z-index: 99; overflow-x: auto; }
.step-item { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; color: var(--text3); transition: all .15s; border: 1px solid transparent; white-space: nowrap; flex-shrink: 0; }
.step-item:hover { background: var(--surface); color: var(--text2); }
.step-item.active { background: var(--blue-bg); color: var(--blue); border-color: rgba(88,166,255,.3); font-weight: 500; }
.step-item.done { color: var(--green); }
.step-item.locked { opacity: .4; cursor: default; }
.step-num { width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--border); flex-shrink: 0; }
.step-item.active .step-num { background: var(--blue); border-color: var(--blue); color: #fff; }
.step-item.done .step-num { background: var(--green); border-color: var(--green); color: #fff; }
.step-arrow { color: var(--border); font-size: 14px; margin: 0 1px; flex-shrink: 0; }

/* ── 主内容区 ────────────────────────────────────────────────────────────── */
.main { position: fixed; top: 96px; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 24px 32px; }
.section { display: none; }
.section.active { display: block; }

/* ── 面板 & 卡片 ─────────────────────────────────────────────────────────── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.card-header { font-size: 15px; font-weight: 600; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.card-header .icon { font-size: 16px; }

/* ── 按钮 ────────────────────────────────────────────────────────────────── */
.btn { font-size: 12px; padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); cursor: pointer; transition: all .15s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 500; }
.btn-primary:hover { background: #4393e6; }
.btn-success { background: #238636; border-color: #2ea043; color: #fff; }
.btn-success:hover { background: #2ea043; }
.btn-danger { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: rgba(248,81,73,.15); }
.btn-warning { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
.btn-warning:hover { background: rgba(210,153,34,.2); }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--surface); }
.btn-lg { padding: 10px 24px; font-size: 14px; border-radius: 8px; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── 表单 ────────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit; }
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--blue); }
.form-textarea { min-height: 80px; resize: vertical; font-family: inherit; font-size: 13px; line-height: 1.5; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }
.form-desc { font-size: 12px; color: var(--text2); margin-bottom: 12px; padding: 10px 14px; background: var(--bg-dark); border-radius: 6px; border-left: 3px solid var(--blue); line-height: 1.7; }
.tag-btn { padding: 3px 8px; font-size: 11px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); cursor: pointer; white-space: nowrap; }
.tag-btn:hover { border-color: var(--blue); color: var(--blue); }

/* ── 引导卡片 ────────────────────────────────────────────────────────────── */
.guide-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px 32px; margin-bottom: 16px; text-align: center; max-width: 640px; margin-left: auto; margin-right: auto; }
.guide-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.guide-card p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.7; }

/* ── Tab 切换 ────────────────────────────────────────────────────────────── */
.tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab-item { padding: 10px 16px; font-size: 12px; cursor: pointer; color: var(--text3); border-bottom: 2px solid transparent; transition: all .15s; }
.tab-item:hover { color: var(--text2); }
.tab-item.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }
.mode-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.mode-tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text2); transition: all .15s; }
.mode-tab.active { background: var(--blue-bg); color: var(--blue); border-color: rgba(88,166,255,.3); }
.mode-tab:hover { background: var(--surface); }

/* ── JSON 编辑器 ─────────────────────────────────────────────────────────── */
.editor-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.editor-tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text2); transition: all .15s; }
.editor-tab.active { background: var(--blue-bg); color: var(--blue); border-color: rgba(88,166,255,.3); }
.editor-status { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
.status-ok { background: var(--green-bg); color: var(--green); padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.status-warn { background: var(--yellow-bg); color: var(--yellow); padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }

/* ── 统计卡片 ─────────────────────────────────────────────────────────────── */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }
.metric-value { font-size: 26px; font-weight: 700; margin-top: 4px; }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── 章节/大纲卡片 ───────────────────────────────────────────────────────── */
.chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.ch-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; transition: all .15s; }
.ch-card:hover { border-color: var(--border2); background: var(--surface2); }
.ch-card.final { border-left: 3px solid var(--green); }
.ch-card.draft { border-left: 3px solid var(--orange); }
.act-head { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; padding: 8px 12px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); }
.seq-item { display: flex; gap: 10px; padding: 10px 12px; border-radius: 6px; margin-bottom: 4px; border: 1px solid transparent; transition: all .15s; }
.seq-item:hover { border-color: var(--border); background: var(--surface2); }

/* ── 伏笔/关系/因果 ─────────────────────────────────────────────────────── */
.hook-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.hook-status { font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
.hook-open { background: var(--yellow-bg); color: var(--yellow); }
.hook-resolved { background: var(--green-bg); color: var(--green); }
.rel-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.rel-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.rel-bar { height: 100%; border-radius: 3px; transition: width .3s; }
.causal-node { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
.causal-ch { font-size: 11px; color: var(--purple); font-weight: 600; min-width: 48px; padding-top: 2px; }

/* ── 审计面板 ────────────────────────────────────────────────────────────── */
.audit-layer { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.audit-layer-header { padding: 12px 16px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.audit-layer-header.passed { background: var(--green-bg); color: var(--green); }
.audit-layer-header.failed { background: var(--red-bg); color: var(--red); }
.audit-issue { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; display: flex; gap: 10px; }
.audit-issue .severity { font-size: 10px; padding: 1px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
.severity-critical { background: var(--red-bg); color: var(--red); }
.severity-warning { background: var(--yellow-bg); color: var(--yellow); }
.audit-issue:hover { background: var(--bg-dark); }

/* ── Badge ─────────────────────────────────────────────────────────────────── */
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-inciting { background: var(--yellow-bg); color: var(--yellow); }
.badge-turning { background: var(--purple-bg); color: var(--purple); }
.badge-climax { background: var(--red-bg); color: var(--red); }
.badge-setup { background: var(--green-bg); color: var(--green); }
.badge-midpoint { background: rgba(236,72,153,.12); color: #ec4899; }
.badge-language { background: var(--blue-bg); color: var(--blue); }
.badge-structure { background: var(--purple-bg); color: var(--purple); }
.badge-drama { background: var(--orange-bg); color: var(--orange); }

/* ── 通用 ─────────────────────────────────────────────────────────────────── */
.empty { font-size: 13px; color: var(--text3); padding: 32px 0; text-align: center; }
.loading { font-size: 13px; color: var(--text3); padding: 32px; text-align: center; }
.error { font-size: 13px; color: var(--red); padding: 20px; text-align: center; }
.toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.section-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .05em; }
.toast { position: fixed; top: 60px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 999; animation: slideIn .3s; max-width: 400px; }
.toast-ok { background: var(--green); color: #fff; }
.toast-err { background: var(--red); color: #fff; }
.toast-loading { background: var(--blue); color: #fff; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
.toast-loading::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #fff; margin-right: 8px; animation: pulse 1s infinite; }

/* ── 弹窗 ────────────────────────────────────────────────────────────────── */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 560px; box-shadow: 0 8px 32px rgba(0,0,0,.4); max-height: 85vh; overflow-y: auto; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

/* ── 简易表单 ────────────────────────────────────────────────────────────── */
.form-item-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; position: relative; }
.form-item-card .remove-btn { position: absolute; top: 8px; right: 8px; cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; }
.form-item-card .remove-btn:hover { color: var(--red); }

.arc-canvas { width: 100%; height: 180px; border: 1px solid var(--border); border-radius: var(--radius); }
</style>
</head>
<body>

<!-- ── 顶部导航 ──────────────────────────────────────────────────────────────── -->
<div class="topbar">
  <div class="topbar-brand"><span>Dramatica</span>-Flow</div>
  <div class="topbar-sep"></div>
  <div class="book-selector">
    <select id="book-select" onchange="selectBookAndLoad(this.value)">
      <option value="">-- 选择书籍 --</option>
    </select>
    <button class="btn btn-sm" onclick="showCreateBookModal()">+ 新建</button>
  </div>
  <div class="topbar-right">
    <a href="/timeline" class="btn btn-ghost btn-sm" title="多线叙事时间线" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px">&#9776; 时间线</a>
    <button class="btn btn-ghost btn-sm" onclick="nav('settings')" title="修改 API 配置" id="topbar-settings-btn">&#9881;</button>
  </div>
</div>

<!-- ── 步骤条（7步） ───────────────────────────────────────────────────────── -->
<div class="steps-bar" id="steps-bar">
  <div class="step-item" data-step="1" id="stepbar-1" onclick="goStep(1)" style="display:none">
    <div class="step-num">1</div> <span>API配置</span>
  </div>
  <span class="step-arrow" id="arrow-1" style="display:none">&#8250;</span>
  <div class="step-item active" data-step="2" id="stepbar-2" onclick="goStep(2)">
    <div class="step-num" id="stepnum-2">1</div> <span id="steplbl-2">创建书籍</span>
  </div>
  <span class="step-arrow" id="arrow-2">&#8250;</span>
  <div class="step-item" data-step="3" id="stepbar-3" onclick="goStep(3)">
    <div class="step-num" id="stepnum-3">2</div> <span id="steplbl-3">世界观</span>
  </div>
  <span class="step-arrow" id="arrow-3">&#8250;</span>
  <div class="step-item" data-step="4" id="stepbar-4" onclick="goStep(4)">
    <div class="step-num" id="stepnum-4">3</div> <span id="steplbl-4">大纲规划</span>
  </div>
  <span class="step-arrow" id="arrow-4">&#8250;</span>
  <div class="step-item" data-step="5" id="stepbar-5" onclick="goStep(5)">
    <div class="step-num" id="stepnum-5">4</div> <span id="steplbl-5">写作</span>
  </div>
  <span class="step-arrow" id="arrow-5">&#8250;</span>
  <div class="step-item" data-step="6" id="stepbar-6" onclick="goStep(6)">
    <div class="step-num" id="stepnum-6">5</div> <span id="steplbl-6">审计</span>
  </div>
  <span class="step-arrow" id="arrow-6">&#8250;</span>
  <div class="step-item" data-step="7" id="stepbar-7" onclick="goStep(7)">
    <div class="step-num" id="stepnum-7">6</div> <span id="steplbl-7">导出</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span id="config-indicator" style="font-size:11px;color:var(--text3);display:none">
      <span id="config-dot" style="width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px"></span>
      <span id="config-text"></span>
    </span>
  </div>
</div>

<!-- ── 主内容区 ──────────────────────────────────────────────────────────────── -->
<div class="main">

  <!-- Step 1: API 配置 -->
  <div class="section" id="s-step1" style="display:none">
    <div class="guide-card">
      <h2>配置 LLM 接口</h2>
      <p>选择 AI 提供商并配置密钥。配置一次即可，之后自动记住。</p>
      <div id="settings-panel"><div class="loading">加载中...</div></div>
      <div style="margin-top: 20px">
        <button class="btn btn-primary btn-lg" onclick="saveSettingsAndNext()">保存并继续 &#8250;</button>
      </div>
    </div>
  </div>

  <!-- Step 2: 创建书籍 -->
  <div class="section" id="s-step2">
    <div id="step2-panel"><div class="loading">加载中...</div></div>
  </div>

  <!-- Step 3: 世界观设定 -->
  <div class="section" id="s-step3">
    <div id="step3-panel"><div class="loading">加载中...</div></div>
  </div>

  <!-- Step 4: 大纲规划 -->
  <div class="section" id="s-step4">
    <div id="step4-panel"><div class="loading">加载中...</div></div>
  </div>

  <!-- Step 5: 写作 -->
  <div class="section" id="s-step5">
    <div id="step5-panel"><div class="loading">加载中...</div></div>
  </div>

  <!-- Step 6: 审计修订 -->
  <div class="section" id="s-step6">
    <div id="step6-panel"><div class="loading">加载中...</div></div>
  </div>

  <!-- Step 7: 导出 -->
  <div class="section" id="s-step7">
    <div id="step7-panel"><div class="loading">加载中...</div></div>
  </div>

  <!-- 设置页面 -->
  <div class="section" id="s-settings">
    <div id="settings-page-panel"><div class="loading">加载中...</div></div>
  </div>
</div>

<!-- ── 弹窗：创建书籍 ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-create" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>创建新书籍</h3>
    <div class="form-row">
      <div class="form-group"><label class="form-label">书名 *</label><input class="form-input" id="cb-title" placeholder="例：吞天魔帝"></div>
      <div class="form-group"><label class="form-label">题材</label><select class="form-select" id="cb-genre"><option>玄幻</option><option>仙侠</option><option>都市</option><option>科幻</option><option>历史</option><option>言情</option><option>悬疑</option><option>游戏</option><option>无限流</option><option>其他</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">目标章数</label><input class="form-input" id="cb-chapters" type="number" value="90"></div>
      <div class="form-group"><label class="form-label">每章字数</label><input class="form-input" id="cb-words" type="number" value="4000"></div>
    </div>
    <div class="form-group"><label class="form-label">禁止词（逗号分隔）</label><input class="form-input" id="cb-forbidden" placeholder="突然,忽然,竟然"></div>
    <div class="form-group"><label class="form-label">写作风格<span class="text-muted" style="font-weight:400;margin-left:4px">（一段话描述你想要的文风）</span></label>
      <textarea class="form-input" id="cb-style" rows="3" placeholder="例如：文笔简洁干练，对话幽默犀利，善用短句营造紧张感，描写偏电影镜头感，少用华丽辞藻"></textarea>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='节奏明快爽感足，对话干脆利落，升级打脸不拖泥带水，善用夸张修辞制造爽点'">热血爽文</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='古风雅致，善用诗词典故，描写空灵飘逸，节奏悠然，注重意境和哲理'">仙侠修真</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='现代都市感，对话生活化接地气，善用职场黑话和商业术语，节奏快信息密度高'">都市商战</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='细腻柔美，善用心理描写和环境烘托情感，对话含蓄有张力，注重人物情感细节'">都市言情</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='冷静克制，善用伏笔和细节暗示，叙述留白制造悬念，节奏紧凑但内敛'">悬疑推理</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='硬科幻质感，善用技术术语和科学原理，世界观宏大，描写偏理性冷静'">科幻未来</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='半文半白，考据扎实，权谋博弈描写细腻，对话符合时代特征，注重历史氛围'">历史架空</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='轻松诙谐，对话风趣，善用吐槽和反转，节奏轻快，常有意想不到的幽默感'">轻松搞笑</button>
        <button type="button" class="tag-btn" onclick="document.getElementById('cb-style').value='文笔沉稳厚重，善用象征隐喻，氛围压抑沉郁，节奏缓慢但充满张力'">暗黑复仇</button>

      <button class="btn" onclick="document.getElementById('modal-create').style.display='none'">取消</button>
      <button class="btn btn-success" onclick="createBook()">创建</button>
    </div>
  </div>
</div>

<!-- ── 弹窗：查看章节 ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-chapter" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:720px">
    <h3 id="modal-chapter-title">章节内容</h3>
    <div id="modal-chapter-content" style="font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.8;max-height:60vh;overflow-y:auto"></div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn" onclick="document.getElementById('modal-chapter').style.display='none'">关闭</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8766/api';
let currentBook = null, bookData = null, allBooks = [];
let currentStep = 2, maxUnlockedStep = 2;
let apiConfigured = false, apiProvider = 'deepseek';
let setupCache = {};
let chapterOutlinesCache = null;

// ── 工具函数 ──────────────────────────────────────────────────────────────

function toast(msg, ok, persistent) {
  // 清除旧的持久 toast
  document.querySelectorAll('.toast-persist').forEach(e => e.remove());
  const el = document.createElement('div');
  if (persistent) el.className = 'toast toast-loading toast-persist';
  else if (ok === 'loading') el.className = 'toast toast-loading toast-persist';
  else el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  el.textContent = msg; document.body.appendChild(el);
  if (!persistent && ok !== 'loading') setTimeout(() => el.remove(), 5000);
  return el;
}

async function api(endpoint, opts) {
  const r = await fetch(`${API}${endpoint}`, opts);
  if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.detail || `HTTP ${r.status}`); }
  return await r.json();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const STYLES = {
  'hot-blood': '热血升级', 'cultivation': '仙侠修真', 'urban-business': '都市商战',
  'urban-romance': '都市言情', 'mystery': '悬疑推理', 'scifi': '科幻未来',
  'historical': '历史架空', 'humor': '轻松搞笑', 'dark-revenge': '暗黑复仇',
  'literary': '文艺清新', 'farming': '种田日常', 'infinite': '无限流',
  'fast-paced': '快节奏爽文', 'slow-burn': '慢热沉浸'
};

// ── 导航 & 步骤 ────────────────────────────────────────────────────────────

function goStep(n) {
  if (n === 1 && apiConfigured) { nav('settings'); return; }
  if (n > 1 && !apiConfigured) { toast('请先完成 API 配置', false); return; }
  currentStep = n;
  document.querySelectorAll('.step-item').forEach(s => { s.classList.remove('active'); if (parseInt(s.dataset.step) === n) s.classList.add('active'); });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('s-step' + n); if (el) el.classList.add('active');
  renderStep(n);
}

function unlockStep(n) { if (n > maxUnlockedStep) maxUnlockedStep = n; }

function nav(page) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.step-item').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('s-' + page); if (el) el.classList.add('active');
  if (page === 'settings') loadSettingsPage();
}

function renderStep(n) {
  const fns = { 1: loadStep1, 2: loadStep2, 3: loadStep3, 4: loadStep4, 5: loadStep5, 6: loadStep6, 7: loadStep7 };
  if (fns[n]) fns[n]();
  updateStepsBar();
}

function updateStepsBar() {
  const showStep1 = !apiConfigured;
  document.getElementById('stepbar-1').style.display = showStep1 ? '' : 'none';
  document.getElementById('arrow-1').style.display = showStep1 ? '' : 'none';
  for (let i = 2; i <= 7; i++) {
    const numEl = document.getElementById('stepnum-' + i);
    if (numEl) numEl.textContent = i - 1;
  }
  const indicator = document.getElementById('config-indicator');
  if (apiConfigured) {
    indicator.style.display = '';
    document.getElementById('config-dot').style.background = 'var(--green)';
    const providerNames = {deepseek:'DeepSeek',ollama:'Ollama',openai:'OpenAI',zhipu:'智谱GLM',moonshot:'Moonshot',qwen:'通义千问'};
    document.getElementById('config-text').textContent = providerNames[apiProvider] || apiProvider;
  } else indicator.style.display = 'none';
  const sb = document.getElementById('topbar-settings-btn');
  const providerNames = {deepseek:'DeepSeek',ollama:'Ollama',openai:'OpenAI',zhipu:'智谱GLM',moonshot:'Moonshot',qwen:'通义千问'};
  sb.innerHTML = apiConfigured ? ('&#9881; ' + (providerNames[apiProvider] || apiProvider)) : '&#9881;';
  document.querySelectorAll('.step-item').forEach(s => {
    const sn = parseInt(s.dataset.step);
    s.classList.toggle('done', sn < maxUnlockedStep);
    s.classList.toggle('locked', sn > maxUnlockedStep);
    if (sn === 1) { s.classList.toggle('locked', false); s.classList.toggle('done', apiConfigured); }
  });
}

// ── 书籍管理 ───────────────────────────────────────────────────────────────

async function loadBooks() { allBooks = await api('/books'); updateBookSelector(); }

function updateBookSelector() {
  const sel = document.getElementById('book-select');
  const cur = currentBook ? currentBook.id : '';
  sel.innerHTML = '<option value="">-- 选择书籍 --</option>' +
    allBooks.map(b => `<option value="${b.id}" ${b.id===cur?'selected':''}>${b.title} (${b.finals||0}/${b.target_chapters}章)</option>`).join('');
}

function selectBook(id) {
  if (!id) { currentBook = null; bookData = null; return; }
  currentBook = allBooks.find(b => b.id === id);
  if (currentBook) {
    const s = currentBook.stage || 1;
    if (s >= 2) unlockStep(3);
    if (s >= 3) unlockStep(4);
    if (s >= 4) unlockStep(5);
  }
}

async function selectBookAndLoad(id) {
  selectBook(id);
  await loadBookData();
  updateBookSelector();
}

function showCreateBookModal() { document.getElementById('modal-create').style.display = 'flex'; document.getElementById('cb-title').focus(); }

async function createBook() {
  const title = document.getElementById('cb-title').value.trim();
  if (!title) return toast('请填写书名', false);
  try {
    const res = await api('/books', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        title, genre: document.getElementById('cb-genre').value,
        chapters: parseInt(document.getElementById('cb-chapters').value) || 90,
        words: parseInt(document.getElementById('cb-words').value) || 4000,
        forbidden: document.getElementById('cb-forbidden').value,
        style_guide: document.getElementById('cb-style').value,
      }),
    });
    toast(`「${title}」创建成功`, true);
    document.getElementById('modal-create').style.display = 'none';
    await loadBooks(); selectBookAndLoad(res.book_id);
    unlockStep(3); goStep(3);
  } catch (e) { toast('创建失败: ' + e.message, false); }
}

async function deleteBook(id) {
  if (!confirm('确定删除？不可恢复。')) return;
  await api(`/books/${id}`, { method: 'DELETE' });
  toast('已删除', true);
  if (currentBook && currentBook.id === id) { currentBook = null; bookData = null; }
  await loadBooks();
}

async function editBookSettings(id) {
  const b = allBooks.find(x => x.id === id);
  if (!b) return;
  const newChapters = prompt('修改目标章节数：', b.target_chapters);
  if (newChapters === null) return;
  const n = parseInt(newChapters);
  if (!n || n < 1) return toast('章节数无效', false);
  try {
    await api(`/books/${id}/config`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ target_chapters: n }),
    });
    toast(`目标章节数已更新为 ${n}`, true);
    await loadBooks();
    if (currentBook && currentBook.id === id) { await loadBookData(); }
  } catch (e) { toast('更新失败: ' + e.message, false); }
}

async function loadBookData() {
  if (!currentBook) return;
  try {
    const [book, chapters, causal, emotions, hooks, relations] = await Promise.all([
      api(`/books/${currentBook.id}`), api(`/books/${currentBook.id}/chapters`),
      api(`/books/${currentBook.id}/causal-chain`), api(`/books/${currentBook.id}/emotional-arcs`),
      api(`/books/${currentBook.id}/hooks`), api(`/books/${currentBook.id}/relationships`),
    ]);
    let outline = null, chOutlines = null;
    try { outline = await api(`/books/${currentBook.id}/outline`); } catch {}
    try { chOutlines = await api(`/books/${currentBook.id}/chapter-outlines`); } catch {}
    chapterOutlinesCache = chOutlines;
    bookData = { book, chapters, causal, emotions, hooks, relations, outline, chapterOutlines: chOutlines };
  } catch (e) { toast('加载数据失败: ' + e.message, false); }
}

// ── Step 1: API 配置 ──────────────────────────────────────────────────────

async function loadStep1() {
  const s = await api('/settings');
  const ol = s.llm_provider === 'ollama';
  const isCustom = !['deepseek','ollama'].includes(s.llm_provider);
  document.getElementById('settings-panel').innerHTML = `
    <div style="text-align:left">
        <div class="mode-tabs" style="justify-content:center;margin-bottom:20px;flex-wrap:wrap" data-provider="${s.llm_provider}">
        <div class="mode-tab ${!ol&&!isCustom?'active':''}" onclick="switchProvider('deepseek',this)">DeepSeek</div>
        <div class="mode-tab ${ol?'active':''}" onclick="switchProvider('ollama',this)">Ollama（本地）</div>
        <div class="mode-tab ${s.llm_provider==='openai'?'active':''}" onclick="switchProvider('openai',this)">OpenAI</div>
        <div class="mode-tab ${s.llm_provider==='zhipu'?'active':''}" onclick="switchProvider('zhipu',this)">智谱GLM</div>
        <div class="mode-tab ${s.llm_provider==='moonshot'?'active':''}" onclick="switchProvider('moonshot',this)">Moonshot</div>
        <div class="mode-tab ${s.llm_provider==='qwen'?'active':''}" onclick="switchProvider('qwen',this)">通义千问</div>
        <div class="mode-tab ${isCustom?'active':''}" onclick="switchProvider('custom',this)">自定义</div>
      </div>
      <div id="p-deepseek" style="${ol||isCustom?'display:none':''}">
        <div class="form-group"><label class="form-label">API Key *</label><input class="form-input" id="s-ds-key" type="password" value="${s.deepseek_api_key}" placeholder="sk-xxx"><div class="form-hint">platform.deepseek.com 获取</div></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Base URL</label><input class="form-input" id="s-ds-url" value="${s.deepseek_base_url}"></div>
          <div class="form-group"><label class="form-label">模型</label><input class="form-input" id="s-ds-model" value="${s.deepseek_model}"></div>
        </div>
      </div>
      <div id="p-ollama" style="${ol?'':'display:none'}">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Ollama 地址</label><input class="form-input" id="s-ol-url" value="${s.ollama_base_url}"><div class="form-hint">默认 localhost:11434</div></div>
          <div class="form-group"><label class="form-label">模型</label><input class="form-input" id="s-ol-model" value="${s.ollama_model}" placeholder="llama3.1"><div class="form-hint">ollama list 查看</div></div>
        </div>
      </div>
      <div id="p-custom" style="${isCustom?'':'display:none'}">
        <div class="form-desc">配置任意 OpenAI 兼容接口（如自建 API、中转站等），只需填写 Base URL、API Key 和模型名</div>
        <div class="form-group"><label class="form-label">API Key *</label><input class="form-input" id="s-cust-key" type="password" value="${s.custom_api_key||''}" placeholder="你的 API Key"></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Base URL *</label><input class="form-input" id="s-cust-url" value="${s.custom_base_url||''}" placeholder="https://api.example.com/v1"></div>
          <div class="form-group"><label class="form-label">模型 *</label><input class="form-input" id="s-cust-model" value="${s.custom_model||''}" placeholder="gpt-4o / glm-4 / moonshot-v1 ..."></div>
        </div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group"><label class="form-label">默认温度</label><input class="form-input" id="s-temp" type="number" step="0.1" value="${s.default_temperature}"></div>
        <div class="form-group"><label class="form-label">审计模型（可选）</label><input class="form-input" id="s-auditor" value="${s.auditor_model||''}" placeholder="留空用主模型"></div>
      </div>
    </div>`;
}

function switchProvider(p, el) {
  el.parentElement.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // 用 data-provider 记录当前选择（不依赖文本判断）
  el.parentElement.dataset.provider = p;
  const isDeepSeek = p === 'deepseek';
  const isOllama = p === 'ollama';
  const isOpenAICompatible = !isDeepSeek && !isOllama; // openai/zhipu/moonshot/qwen/custom 都用同一面板
  document.getElementById('p-deepseek').style.display = isDeepSeek ? '' : 'none';
  document.getElementById('p-ollama').style.display = isOllama ? '' : 'none';
  document.getElementById('p-custom').style.display = isOpenAICompatible ? '' : 'none';
}

async function saveSettingsAndNext() {
  // 从 data-provider 读取当前选择（可靠方式，不依赖文本匹配）
  const tabs = document.querySelector('#settings-panel .mode-tabs');
  const provider = tabs && tabs.dataset.provider ? tabs.dataset.provider : 'deepseek';
  const isOllama = provider === 'ollama';
  const isOpenAICompatible = !isOllama && provider !== 'deepseek';
  await api('/settings', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      llm_provider: provider,
      deepseek_api_key: document.getElementById('s-ds-key').value,
      deepseek_base_url: document.getElementById('s-ds-url').value,
      deepseek_model: document.getElementById('s-ds-model').value,
      ollama_base_url: document.getElementById('s-ol-url').value,
      ollama_model: document.getElementById('s-ol-model').value,
      default_temperature: document.getElementById('s-temp').value,
      auditor_model: document.getElementById('s-auditor').value,
      custom_base_url: isOpenAICompatible ? document.getElementById('s-cust-url').value : '',
      custom_api_key: isOpenAICompatible ? document.getElementById('s-cust-key').value : '',
      custom_model: isOpenAICompatible ? document.getElementById('s-cust-model').value : '',
    }),
  });
  apiConfigured = true; apiProvider = provider;
  updateStepsBar(); toast('配置已保存', true); goStep(2);
}

// ── Step 2: 创建书籍 ──────────────────────────────────────────────────────

function loadStep2() {
  const p = document.getElementById('step2-panel');
  if (!allBooks.length) {
    p.innerHTML = `<div class="guide-card"><h2>创建你的小说</h2><p>还没有书籍，点击下方按钮开始。</p><button class="btn btn-primary btn-lg" onclick="showCreateBookModal()">+ 创建第一本书</button></div>`;
    return;
  }
  p.innerHTML = `
    <div class="toolbar" style="justify-content:center"><button class="btn btn-primary" onclick="showCreateBookModal()">+ 创建新书</button></div>
    <div style="max-width:600px;margin:0 auto">
      ${allBooks.map(b => `
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;background:var(--surface);transition:all .15s"
             onclick="selectBook('${b.id}');goStep(3)">
          <div style="width:4px;height:36px;border-radius:2px;background:${currentBook&&currentBook.id===b.id?'var(--blue)':'var(--border)'}"></div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${esc(b.title)}</div>
            <div style="font-size:11px;color:var(--text3)">${esc(b.genre)} · ${b.finals||0}/${b.target_chapters}章</div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteBook('${b.id}')">删除</button>
          <button class="btn btn-sm" onclick="event.stopPropagation();editBookSettings('${b.id}')" title="修改章节数等设置">&#9881;</button>
        </div>
      `).join('')}
    </div>`;
}

// ── Step 3: 世界观设定 ────────────────────────────────────────────────────

let step3Mode = 'ai'; // ai | form | json

async function editExistingSetup(mode) {
  const panel = document.getElementById('step3-panel');
  panel.innerHTML = '<div class="loading">加载已有配置...</div>';
  try {
    const [chars, world, events] = await Promise.all([
      api(`/books/${currentBook.id}/setup/characters`),
      api(`/books/${currentBook.id}/setup/world`),
      api(`/books/${currentBook.id}/setup/events`),
    ]);
    const charsData = JSON.parse(chars.content);
    const worldData = JSON.parse(world.content);
    const eventsData = JSON.parse(events.content);
    if (mode === 'form') {
      formChars = charsData.characters || [];
      formWorld = { locations: worldData.locations || [], factions: worldData.factions || [], rules: worldData.rules || [] };
      formEvents = eventsData.events || [];
      renderStep3Form();
    } else if (mode === 'json') {
      setupCache.characters = chars.content;
      setupCache.world = world.content;
      setupCache.events = events.content;
      renderJSONEditor('characters');
    } else {
      loadStep3AI();
    }
  } catch (e) {
    toast('加载已有配置失败: ' + e.message, false);
    panel.innerHTML = '<div class="empty">加载失败，请重试</div>';
  }
}

async function loadStep3(forceSelect) {
  if (!currentBook) { document.getElementById('step3-panel').innerHTML = '<div class="empty">请先选择或创建一本书籍</div>'; return; }
  let status;
  try { status = await api(`/books/${currentBook.id}/setup/status`); } catch { status = { has_templates: false, has_setup_state: false }; }
  if (status.has_setup_state && !forceSelect) {
    document.getElementById('step3-panel').innerHTML = `
      <div class="guide-card"><h2>世界观已配置</h2><p>此书世界观已加载成功。你可以选择修改方式：</p>
        <div style="text-align:left;max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:10px;margin-top:16px">
          <div style="display:flex;gap:12px;align-items:center;padding:12px;background:var(--bg-dark);border-radius:6px;border-left:3px solid var(--green);cursor:pointer" onclick="editExistingSetup('form')">
            <div style="font-size:20px">&#128221;</div>
            <div><div style="font-size:13px;font-weight:500">表单编辑</div><div style="font-size:11px;color:var(--text3)">在可视化表单中修改角色、地点、事件</div></div>
          </div>
          <div style="display:flex;gap:12px;align-items:center;padding:12px;background:var(--bg-dark);border-radius:6px;border-left:3px solid var(--purple);cursor:pointer" onclick="editExistingSetup('json')">
            <div style="font-size:20px">&#128196;</div>
            <div><div style="font-size:13px;font-weight:500">JSON 编辑</div><div style="font-size:11px;color:var(--text3)">直接编辑原始 JSON 数据</div></div>
          </div>
          <div style="display:flex;gap:12px;align-items:center;padding:12px;background:var(--bg-dark);border-radius:6px;border-left:3px solid var(--blue);cursor:pointer" onclick="editExistingSetup('ai')">
            <div style="font-size:20px">&#129302;</div>
            <div><div style="font-size:13px;font-weight:500">AI 重新生成</div><div style="font-size:11px;color:var(--text3)">描述新想法，让 AI 重新生成（当前数据仅作参考）</div></div>
          </div>
          <div style="display:flex;gap:12px;align-items:center;padding:12px;background:var(--bg-dark);border-radius:6px;border-left:3px solid #e67e22;cursor:pointer" onclick="loadStep3Extract()">
            <div style="font-size:20px">&#128214;</div>

async function aiGenerateSetup() {

  toast('AI 正在生成世界观，请稍候...', 'loading');

    const res = await api(`/books/${currentBook.id}/ai-generate/setup`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},

function renderAICharsPreview(chars) {
  return chars.map(c => `
    <div class="form-item-card">

      <div style="font-size:11px;color:var(--text3);margin-top:2px">性格：${(c.personality||[]).map(p=>esc(p)).join('、')}</div>
    </div>`).join('');
}

function showAIWorldPreview(world) {
  const locs = world.locations || [], facs = world.factions || [], rules = world.rules || [];
  return `<div style="font-size:12px;color:var(--text2)">
    <div class="section-label">地点 (${locs.length})</div>
    ${locs.map(l => `<div style="padding:6px 0">${esc(l.name)}：${esc(l.description||'-')}</div>`).join('')}
    <div class="section-label" style="margin-top:10px">势力 (${facs.length})</div>
    ${facs.map(f => `<div style="padding:6px 0">${esc(f.name)}：${esc(f.description||'-')}</div>`).join('')}
    <div class="section-label" style="margin-top:10px">世界规则 (${rules.length})</div>
    ${rules.map(r => `<div style="padding:6px 0">${esc(r.name)}：${esc(r.description||'-')}</div>`).join('')}
  </div>`;
}

function showAIEventsPreview(events) {
  return events.map(e => `
    <div class="form-item-card">
      <div style="font-size:13px;font-weight:600">${esc(e.name)} <span class="badge badge-inciting" style="margin-left:6px">第${e.suggested_act||'?'}幕</span></div>

      <div style="font-size:11px;color:var(--text3);margin-top:2px">功能：${esc(e.suggested_function||'-')} · 涉及：${(e.characters_involved||[]).join(', ')}</div>
    </div>`).join('');

function showAIPreview(tab, el) {
  el.parentElement.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const data = window._aiResult || {};
  const cont = document.getElementById('ai-preview-content');
  if (tab === 'chars') cont.innerHTML = renderAICharsPreview(data.characters || []);
  else if (tab === 'world') cont.innerHTML = showAIWorldPreview(data.world || {});
  else cont.innerHTML = showAIEventsPreview(data.events || []);
}

async function saveAIResult() {
  if (!currentBook || !window._aiResult) return;
  try {
    const r = window._aiResult;
    // 包装为后端期望的对象格式：characters.json → {"characters":[...]}
    await api(`/books/${currentBook.id}/setup/characters`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ file_type: 'characters', content: JSON.stringify({ characters: r.characters }, null, 2) }),
    });
    // world.json 已是 {locations:[],factions:[],rules:[]} 格式，但需加 world_rules key
    await api(`/books/${currentBook.id}/setup/world`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ file_type: 'world', content: JSON.stringify(r.world, null, 2) }),
    });
    // events.json → {"events":[...]}
    await api(`/books/${currentBook.id}/setup/events`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ file_type: 'events', content: JSON.stringify({ events: r.events }, null, 2) }),
    });
    const res = await api(`/books/${currentBook.id}/setup/load`, { method: 'POST' });
    toast(`保存成功：${res.characters.length} 角色、${res.events} 事件，已进入世界观编辑`, true);
    unlockStep(3); goStep(3);
    setTimeout(() => { step3Mode = 'form'; loadStep3Form(window._aiResult); }, 100);
  } catch (e) { toast('保存失败: ' + e.message, false); }
}

function handleNovelFile(input) {

function readNovelFile(file) {

    updateCharCount();
  };
  reader.onerror = () => toast('文件读取失败', false);
  reader.readAsText(file, 'utf-8');
}

      </div>

function handleImportJsonFile(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('import-json-text').value = e.target.result;
    document.getElementById('import-json-file-info').textContent = `已加载：${input.files[0].name}（${(input.files[0].size / 1024).toFixed(1)} KB）`;
  };
  reader.readAsText(input.files[0], 'utf-8');
}

async function doImportJson() {
  if (!currentBook) return;
  const raw = document.getElementById('import-json-text').value.trim();
  if (!raw) return toast('请粘贴或上传 JSON 内容', false);

  // 验证 JSON 格式
  let data;
  try {
    data = JSON.parse(raw);
  } catch (e) {
    return toast('JSON 格式错误：' + e.message, false);
  }

  // 验证必要字段
  if (!data.characters || !Array.isArray(data.characters)) {

async function doImportChOutlines() {
  if (!currentBook) return;
  const raw = document.getElementById('import-co-text').value.trim();
  if (!raw) return toast('请粘贴或上传 JSON 内容', false);
  let data;
  try { data = JSON.parse(raw); } catch (e) { return toast('JSON 格式错误：' + e.message, false); }
  if (!Array.isArray(data)) return toast('章纲必须是 JSON 数组 [...]', false);
  if (data.length === 0) return toast('章纲数组为空', false);
  if (data.length > 500) return toast(`单次上限 500 章，当前 ${data.length} 章，请分批导入`, false);

  const merge = document.getElementById('import-co-mode').value === 'append';
  const startCh = parseInt(document.getElementById('import-co-start').value) || 1;

  // 覆盖模式下重新编号
  if (!merge) {
    data.forEach((co, i) => {
      co.chapter_number = startCh + i;
      if (co.beats) co.beats.forEach((b, bi) => { b.id = `beat_${co.chapter_number}_${bi+1}`; });
    });
  }

  toast(`正在导入 ${data.length} 章章纲...`, 'loading');
  try {
    const res = await api(`/books/${currentBook.id}/import/chapter-outlines`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ outlines: data, merge: merge }),

}

async function saveNewThread() {
  const name = document.getElementById('new-thread-name')?.value?.trim();
  if (!name) return toast('请填写线程名称', false);
  const type = document.getElementById('new-thread-type').value;
  const selectedChars = Array.from(document.getElementById('new-thread-chars').selectedOptions).map(o => o.value);
  const id = 'thread_' + name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_').toLowerCase();
  try {
    await api(`/books/${currentBook.id}/threads`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        id, name, type,
        pov_character_id: document.getElementById('new-thread-pov').value,
        character_ids: selectedChars,
        goal: document.getElementById('new-thread-goal').value,
        start_chapter: parseInt(document.getElementById('new-thread-start').value) || 1,
        weight: parseFloat(document.getElementById('new-thread-weight').value) || 0.7,
      }),
    });
    toast('线程已创建', true);
    await loadThreadsData();
  } catch (e) { toast('创建失败: ' + e.message, false); }
}

async function updateThreadField(threadId, field, value) {
  try {
    await api(`/books/${currentBook.id}/threads/${threadId}`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ [field]: value }),
    });
  } catch (e) { toast('更新失败', false); }
}

async function updateThreadCharacters(threadId, selectEl) {
  const ids = Array.from(selectEl.selectedOptions).map(o => o.value);
  try {
    await api(`/books/${currentBook.id}/threads/${threadId}`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ character_ids: ids }),
    });
  } catch (e) { toast('更新失败', false); }
}

async function deleteThread(threadId) {
  if (!confirm('确定删除此线程？')) return;
  try {
    await api(`/books/${currentBook.id}/threads/${threadId}`, { method: 'DELETE' });
    toast('已删除', true);
    await loadThreadsData();
  } catch (e) { toast('删除失败', false); }
}

// ── Step 3 JSON 模式 ─────────────────────────────────────────────────────

async function loadStep3JSON() {
  if (!currentBook) return;
  const panel = document.getElementById('step3-panel');
  panel.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const [chars, world, events] = await Promise.all([
      api(`/books/${currentBook.id}/setup/characters`).catch(() => null),
      api(`/books/${currentBook.id}/setup/world`).catch(() => null),
      api(`/books/${currentBook.id}/setup/events`).catch(() => null),
    ]);
    setupCache.characters = chars ? chars.content : '[]';
    setupCache.world = world ? world.content : '{}';
    setupCache.events = events ? events.content : '[]';
    renderJSONEditor('characters');
  } catch (e) { panel.innerHTML = `<div class="error">${e.message}</div>`; }
}

function renderJSONEditor(type) {
  const files = [
    { key: 'characters', label: '角色定义', icon: '&#128100;', desc: 'JSON数组，每个角色包含 name, role, need, personality, arc' },
    { key: 'world', label: '世界设定', icon: '&#127758;', desc: 'JSON对象，包含 locations, factions, rules' },
    { key: 'events', label: '事件库', icon: '&#9889;', desc: 'JSON数组，每个事件包含 name, description, suggested_act, suggested_function' },
  ];
  const content = setupCache[type] || '';
  document.getElementById('step3-panel').innerHTML = `
    <div style="max-width:900px;margin:0 auto">
      <div style="margin-bottom:12px"><button class="btn btn-ghost btn-sm" onclick="loadStep3(true)">&#8592; 返回世界观选择</button></div>
      <div class="card">
        <div class="card-header">${files.find(f=>f.key===type).icon} 世界观 JSON 编辑器</div>
        <div class="editor-tabs">
          ${files.map(f => `<div class="editor-tab ${type===f.key?'active':''}" onclick="renderJSONEditor('${f.key}')">${f.label}</div>`).join('')}
        </div>
        <div class="editor-status">
          <span style="color:var(--text2);font-size:11px">${files.find(f=>f.key===type).desc}</span>
        </div>
        <textarea class="form-textarea" id="json-editor" style="min-height:360px;font-family:'Cascadia Code',Consolas,monospace;font-size:12px"
                  oninput="setupCache['${type}']=this.value">${esc(content)}</textarea>
        <div style="display:flex;gap:8px;margin-top:12px;justify-content:space-between">
          <button class="btn" onclick="switchToMode('ai')">切换 AI 模式</button>
          <div style="display:flex;gap:8px">
            <button class="btn btn-success" onclick="saveJSONFile('${type}')">保存当前</button>
            <button class="btn btn-primary btn-lg" onclick="saveJSONAndLoad()">保存全部并加载 &#8250;</button>
          </div>
        </div>
        <div id="json-error" style="margin-top:8px"></div>
      </div>
    </div>`;
}

function switchToMode(mode) {
  if (mode === 'ai') { step3Mode = 'ai'; initAndRenderStep3(); }
  else { step3Mode = 'form'; initAndRenderStep3(); }
}

function saveJSONFile(type) {
  try { JSON.parse(setupCache[type] || document.getElementById('json-editor').value);
    document.getElementById('json-error').innerHTML = '<span style="color:var(--green);font-size:12px">&#10003; JSON 正确</span>';
  } catch (e) { document.getElementById('json-error').innerHTML = `<span style="color:var(--red);font-size:12px">&#10007; ${e.message}</span>`; return; }
  api(`/books/${currentBook.id}/setup/${type}`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ file_type: type, content: setupCache[type] }),
  }).then(() => toast('已保存', true)).catch(e => toast('保存失败: ' + e.message, false));
}

async function saveJSONAndLoad() {
  for (const t of ['characters', 'world', 'events']) {
    try { JSON.parse(setupCache[t]); } catch { return toast(`${t}.json 格式错误`, false); }
    await api(`/books/${currentBook.id}/setup/${t}`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ file_type: t, content: setupCache[t] }),
    });
  }
  const res = await api(`/books/${currentBook.id}/setup/load`, { method: 'POST' });
  toast(`配置加载成功：${res.characters.length} 角色`, true);
  unlockStep(4); goStep(4);
}

// ── Step 4: 大纲规划 ──────────────────────────────────────────────────────

let step4SubTab = 'outline';

function loadStep4() {
  if (!currentBook) { document.getElementById('step4-panel').innerHTML = '<div class="empty">请先选择书籍</div>'; return; }
  if (!bookData) { document.getElementById('step4-panel').innerHTML = '<div class="loading">加载数据中...</div>'; return; }
  const hasOutline = !!bookData.outline;
  const hasChOutlines = !!chapterOutlinesCache;

  document.getElementById('step4-panel').innerHTML = `
    <div style="max-width:900px;margin:0 auto">
      <div class="card">
        <div class="card-header">&#128214; 大纲规划</div>
        <div class="form-desc">创作流程：<b>1) 生成故事大纲</b> → <b>2) 审阅并编辑</b> → <b>3) 生成章节大纲</b> → <b>4) 可修改每章大纲、手动添加事件</b>。大纲确定后才能开始写作。</div>
        <div class="tab-bar">
          <div class="tab-item ${step4SubTab==='outline'?'active':''}" onclick="step4SubTab='outline';loadStep4()">&#128203; 故事大纲 ${hasOutline?'&#10003;':''}</div>
          <div class="tab-item ${step4SubTab==='chapters'?'active':''}" onclick="step4SubTab='chapters';loadStep4()">&#128221; 章节大纲 ${hasChOutlines?'&#10003;':''}</div>
          <div class="tab-item ${step4SubTab==='data'?'active':''}" onclick="step4SubTab='data';loadStep4()">&#128200; 写作数据</div>
        </div>
        <div id="step4-content">${step4SubTab==='outline'?renderStep4Outline():step4SubTab==='chapters'?renderStep4ChOutlines():renderStep4Data()}</div>
      </div>
    </div>`;
}

function renderStep4Outline() {
  const outline = bookData?.outline;
  if (!outline) {
    return `
      <div style="text-align:center;padding:32px">
        <p style="color:var(--text2);margin-bottom:16px">尚未生成故事大纲。可以用 AI 生成，也可以从外部大模型导入。</p>
        <div class="form-group" style="max-width:500px;margin:0 auto;text-align:left">
          <label class="form-label">补充想法（可选）</label>
          <textarea class="form-textarea" id="outline-idea" placeholder="对剧情走向的补充想法..."></textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
          <button class="btn btn-primary btn-lg" onclick="aiGenOutline()">AI 生成故事大纲</button>
          <button class="btn btn-lg" onclick="showImportOutlineModal()">&#128229; 导入大纲</button>
        </div>
      </div>`;
  }
  const seqs = outline.sequences || [];
  const totalScenes = seqs.reduce((s, seq) => s + (seq.estimated_scenes || 0), 0);
  const grouped = {};
  seqs.forEach((s, i) => { (grouped[s.act] = grouped[s.act] || []).push({...s, _idx: i}); });
  return `
    <div class="toolbar">
      <button class="btn btn-primary" onclick="aiGenOutline()">重新生成</button>
      <button class="btn btn-warning" onclick="aiContinueOutline()">AI 续写大纲</button>
      <button class="btn btn-success" onclick="saveOutline()">&#128190; 保存修改</button>
      <button class="btn" onclick="showImportOutlineModal()">&#128229; 导入大纲</button>
      <span style="font-size:11px;color:var(--text3);margin-left:auto">${seqs.length} 个序列 · 共 ${totalScenes} 章</span>
    </div>
    <div class="card" style="padding:14px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:11px;color:var(--text3)">LOGLINE</div>
        <button class="btn btn-ghost btn-sm" onclick="editOutlineLogline()" title="编辑">&#9998;</button>
      </div>
      <div id="outline-logline-display" style="font-size:14px">${esc(outline.logline||'')}</div>
    </div>
    ${Object.entries(grouped).sort((a,b)=>a[0]-b[0]).map(([act, items]) => `
      <div style="margin-bottom:16px">
        <div class="act-head">第 ${act} 幕（${act==1?'铺垫':act==2?'冲突':'结局'}）</div>
        ${items.map(s => `
          <div class="seq-item" style="gap:8px">
            <div style="font-size:11px;color:var(--text3);min-width:20px">${s.number||'-'}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span style="font-size:13px">${esc(s.summary||'')}</span>
                ${s.dramatic_function?`<span class="badge badge-${s.dramatic_function}">${s.dramatic_function}</span>`:''}
              </div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px">钩子：${esc(s.end_hook||'')}</div>
              <div style="font-size:11px;color:var(--text3)">${esc(s.narrative_goal||'-')} · ${s.estimated_scenes||'-'} 章</div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="editOutlineSeq(${s._idx})" title="编辑">&#9998;</button>
            <button class="btn btn-ghost btn-sm" onclick="deleteOutlineSeq(${s._idx})" title="删除">&#128465;</button>
          </div>
        `).join('')}
      </div>
    `).join('')}
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-warning" onclick="aiContinueOutline()">+ AI 续写新序列</button>
      <button class="btn" onclick="addOutlineSeq()" style="margin-left:8px">+ 手动添加序列</button>
    </div>`;
}

async function aiGenOutline() {
  if (!currentBook) return;
  const btn = document.querySelector('#step4-content .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }
  toast('AI 正在生成大纲，请稍候...', 'loading');
  try {
    const idea = document.getElementById('outline-idea')?.value || '';
    const res = await api(`/books/${currentBook.id}/ai-generate/outline`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ idea }),
    });
    if (!res.ok) { toast(res.error || '生成失败', false); return; }
    // 自动保存
    await api(`/books/${currentBook.id}/outline`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ outline: res.data }),
    });
    bookData.outline = res.data;
    toast('大纲已生成并保存', true);
    loadStep4();
  } catch (e) { toast('生成失败: ' + e.message, false); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'AI 生成故事大纲'; } }
}

async function saveOutline() {
  if (!bookData?.outline) return;
  await api(`/books/${currentBook.id}/outline`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ outline: bookData.outline }),
  });
  toast('大纲已保存', true);
}

function editOutlineLogline() {
  if (!bookData?.outline) return;
  const current = bookData.outline.logline || '';
  const newLogline = prompt('修改 Logline：', current);
  if (newLogline === null || newLogline === current) return;
  bookData.outline.logline = newLogline;
  saveOutline();
  loadStep4();
}

function editOutlineSeq(idx) {
  if (!bookData?.outline?.sequences?.[idx]) return;
  const s = bookData.outline.sequences[idx];
  const summary = prompt('序列摘要：', s.summary || '');
  if (summary === null) return;
  const goal = prompt('叙事目标：', s.narrative_goal || '');
  if (goal === null) return;
  const hook = prompt('结尾钩子：', s.end_hook || '');
  if (hook === null) return;
  const scenes = prompt('预计章节数：', s.estimated_scenes || '');
  if (scenes === null) return;
  s.summary = summary;
  s.narrative_goal = goal;
  s.end_hook = hook;
  s.estimated_scenes = parseInt(scenes) || s.estimated_scenes;
  saveOutline();
  loadStep4();
}

function deleteOutlineSeq(idx) {
  if (!bookData?.outline?.sequences) return;
  if (!confirm('确定删除该序列？')) return;
  bookData.outline.sequences.splice(idx, 1);
  // 重新编号
  bookData.outline.sequences.forEach((s, i) => { s.number = i + 1; s.id = s.id || `seq_${String(i+1).padStart(3,'0')}`; if (s.id.startsWith('seq_')) s.id = `seq_${String(i+1).padStart(3,'0')}`; });
  saveOutline();
  loadStep4();
}

function addOutlineSeq() {
  if (!bookData?.outline) return;
  const seqs = bookData.outline.sequences || [];
  const actStr = prompt('所属幕数（1/2/3）：', '2');
  if (!actStr) return;
  const act = parseInt(actStr);
  const summary = prompt('序列摘要：');
  if (!summary) return;
  const goal = prompt('叙事目标：', summary);
  const scenes = parseInt(prompt('预计章节数：', '5')) || 5;
  const hook = prompt('结尾钩子：', '');
  seqs.push({
    id: `seq_${String(seqs.length+1).padStart(3,'0')}`,
    number: seqs.length + 1,
    act: [1,2,3].includes(act) ? act : 2,
    summary, narrative_goal: goal || summary,
    dramatic_function: 'transition',
    key_events: [],
    estimated_scenes: scenes,
    end_hook: hook || '',
  });
  saveOutline();
  loadStep4();
  toast('序列已添加', true);
}

async function aiContinueOutline() {
  if (!currentBook || !bookData?.outline) return;
  const extra = prompt('要续写多少个新序列？', '2');
  if (!extra) return;
  const idea = prompt('续写方向（可选）：', '') || '';
  toast('AI 正在续写大纲，请稍候...', 'loading');
  try {
    const res = await api(`/books/${currentBook.id}/ai-continue/outline`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ extra_sequences: parseInt(extra) || 2, idea }),
    });
    if (!res.ok) { toast(res.error || '续写失败', false); return; }
    bookData.outline = res.data;
    toast(`已追加 ${res.added} 个序列，共 ${res.new_total_chapters} 章`, true);
    await loadBookData();
    loadStep4();
  } catch (e) { toast('续写失败: ' + e.message, false); }
}

function renderStep4ChOutlines() {
  const cos = chapterOutlinesCache;
  if (!cos || !Array.isArray(cos)) {
    const hasOutline = !!bookData?.outline;
    return `<div style="text-align:center;padding:32px">

      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary btn-lg" onclick="aiGenChapterOutlines()" ${!hasOutline?'disabled':''}>AI 生成章节大纲</button>

      </div>
    </div>`;
  }
  return `
    <div class="toolbar">
      <button class="btn btn-primary" onclick="aiGenChapterOutlines()">重新生成</button>

      <button class="btn" onclick="showImportChOutlinesModal()">&#128229; 导入章纲</button>

function editChOutline(idx) {
  const co = chapterOutlinesCache[idx];
  if (!co) return;
  const newTitle = prompt('章节标题：', co.title || '');
  if (newTitle === null) return;
  const newSummary = prompt('章节摘要：', co.summary || co.purpose || '');
  if (newSummary === null) return;
  chapterOutlinesCache[idx].title = newTitle;
  chapterOutlinesCache[idx].summary = newSummary;
  // 保存
  api(`/books/${currentBook.id}/chapter-outlines`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ outlines: chapterOutlinesCache }),
  }).then(() => toast('已更新', true)).catch(e => toast(e.message, false));
  loadStep4();
}

async function aiGenChapterOutlines() {
  if (!currentBook) return;
  const btn = event?.target?.closest('button');
  if (btn) { btn.disabled = true; btn._origText = btn.textContent; btn.textContent = '生成中，请稍候...'; }
  toast('AI 正在生成章节大纲，请耐心等待...', 'loading');
  try {
    const res = await api(`/books/${currentBook.id}/ai-generate/chapter-outlines`, { method: 'POST' });
    if (!res.ok) { toast(res.detail || '生成失败', false); return; }
    chapterOutlinesCache = res.outlines;
    bookData.chapterOutlines = res.outlines;
    toast(`${res.count} 章大纲已生成`, true);
    loadStep4();
  } catch (e) { toast('生成失败: ' + e.message, false); }
  finally { if (btn) { btn.disabled = false; btn.textContent = btn._origText || 'AI 生成章节大纲'; } }
}

function deleteChOutline(idx) {
  if (!chapterOutlinesCache) return;
  if (!confirm('确定删除该章节大纲？')) return;
  chapterOutlinesCache.splice(idx, 1);
  // 重新编号
  chapterOutlinesCache.forEach((co, i) => {
    co.chapter_number = i + 1;
    co.chapter = i + 1;
  });
  bookData.chapterOutlines = chapterOutlinesCache;
  api(`/books/${currentBook.id}/chapter-outlines`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ outlines: chapterOutlinesCache }),
  }).then(() => { toast('已删除', true); loadStep4(); }).catch(e => toast(e.message, false));
}

function addChOutlineManual() {
  if (!chapterOutlinesCache) chapterOutlinesCache = [];
  const n = chapterOutlinesCache.length + 1;
  const title = prompt('章节标题：', `第${n}章`);
  if (!title) return;
  const summary = prompt('章节摘要：', '');
  if (summary === null) return;
  chapterOutlinesCache.push({
    chapter_number: n, chapter: n, title, summary,
    sequence_id: '', beats: [],
    emotional_arc: {"start": "平静", "end": "紧张"},
    mandatory_tasks: ["推进情节"],
    target_words: bookData?.book?.target_words_per_chapter || 4000,
  });
  bookData.chapterOutlines = chapterOutlinesCache;
  api(`/books/${currentBook.id}/chapter-outlines`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ outlines: chapterOutlinesCache }),
  }).then(() => { toast('章节已添加', true); loadStep4(); }).catch(e => toast(e.message, false));
}

async function aiContinueChOutlines() {
  if (!currentBook) return;
  const extra = prompt('要续写多少章？', '10');
  if (!extra) return;
  toast('AI 正在续写章节大纲，请耐心等待...', 'loading');
  try {
    const res = await api(`/books/${currentBook.id}/continue-writing`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ extra_chapters: parseInt(extra) || 10 }),
    });
    if (!res.ok) { toast(res.detail || '续写失败', false); return; }
    chapterOutlinesCache = res.outlines;
    bookData.chapterOutlines = res.outlines;
    await loadBookData();
    const modeTip = res.mode === 'outline_driven'
      ? `（基于 ${res.uncovered_sequences} 个新序列联动续写）`
      : '（自由续写）';
    toast(`已追加 ${res.added} 章大纲，共 ${res.new_total} 章 ${modeTip}`, true);
    loadStep4();
  } catch (e) { toast('续写失败: ' + e.message, false); }
}

function renderStep4Data() {
  if (!bookData) return '<div class="empty">无数据</div>';
  const { causal, hooks, emotions, relations } = bookData;
  return `
    <div class="toolbar"><span style="font-size:12px;color:var(--text2)">写作数据在每章写完后自动更新</span></div>

// ── Step 5: 写作 ──────────────────────────────────────────────────────────

async function saveChapterOutline(idx) {
  const co = chapterOutlinesCache[idx];

  co.summary = document.getElementById('ed-co-summary').value;

      body: JSON.stringify({ outlines: chapterOutlinesCache }),

async function saveDetailedOutline() {

  d.detailed_summary = document.getElementById('ed-detail-summary').value;
  d.chapter_end_hook = document.getElementById('ed-detail-hook').value;

      body: JSON.stringify(d),

async function genChapterContent(chNum) {
  const area = document.getElementById('chapter-content-area');
  if (!area) return;
  area.innerHTML = '<div class="loading" style="padding:10px">AI 正在生成正文，请耐心等待（1-3 分钟）...</div>';

    const res = await api(`/books/${currentBook.id}/ai-generate/chapter-content`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chapter_number: chNum, style_override: document.getElementById('ws-style-override')?.value || '' }),
    });
    if (!res.ok) { toast('正文生成失败', false); area.innerHTML = ''; return; }
    const { content, chars } = res;
    window._lastWrittenChapter = chNum;
    area.innerHTML = `
      <div class="card" style="padding:12px;background:var(--bg2);margin-top:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">

        <div style="font-size:11px;color:var(--text3);max-height:100px;overflow:hidden;white-space:pre-wrap;border-top:1px solid var(--border);padding-top:8px">${esc(content.substring(0, 300))}...</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-sm btn-success" onclick="promoteAndAudit(${chNum})" style="flex:1">&#9989; 确认最终稿并进入审计</button>

async function promoteAndAudit(chNum) {
  toast('正在升级为最终稿...', 'loading');
  try {
    await api(`/books/${currentBook.id}/chapters/${chNum}/promote`, { method: 'POST' });
    toast('已升级为最终稿', true);
    await loadBookData();
    // 自动跳转到审计步骤
    unlockStep(6);
    goStep(6);
  } catch (e) { toast('升级失败: ' + e.message, false); }
}

function renderChapters() {
  if (!bookData) return '<div class="empty">无数据</div>';
  const { chapters } = bookData;
  if (!chapters.length) return '<div class="empty">暂无已写章节</div>';
  const finals = chapters.filter(c => c.kind === 'final');
  const drafts = chapters.filter(c => c.kind === 'draft');
  let html = `<div class="section-label">最终稿 (${finals.length})</div><div class="chapter-grid">` +
    finals.map(c => `<div class="ch-card final" onclick="viewChapter(${c.number})"><div style="font-size:11px;color:var(--text3)">第${c.number}章</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${c.chars||0}字</div></div>`).join('') + '</div>';
  if (drafts.length) {
    html += `<div class="section-label" style="margin-top:14px">草稿 (${drafts.length})</div><div class="chapter-grid">` +
      drafts.map(c => `<div class="ch-card draft" onclick="viewChapter(${c.number})"><div style="font-size:11px;color:var(--text3)">第${c.number}章</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${c.chars||0}字</div></div>`).join('') + '</div>';
  }
  return html;
}

async function viewChapter(ch) {
  const data = await api(`/books/${currentBook.id}/chapters/${ch}`);
  document.getElementById('modal-chapter-title').textContent = `第${ch}章（${data.kind==='final'?'最终稿':'草稿'}，${data.chars}字）`;
  document.getElementById('modal-chapter-content').textContent = data.content;
  document.getElementById('modal-chapter').style.display = 'flex';
}

async function doWrite(count) {
  if (!currentBook) return toast('请先选择书籍', false);
  count = count || 1;
  // 检查准备状态
  const stage = bookData?.book?.stage || 0;
  if (stage < 2) {
    const go = confirm('当前尚未完成世界观设定，直接写作可能导致内容质量不佳。\n\n建议先完成以下步骤：\n1. 配置角色、世界观\n2. 生成故事大纲和章节大纲\n\n是否仍要继续写作？');
    if (!go) return;
  } else if (stage < 3) {
    const go = confirm('当前尚未生成故事大纲，系统将自动生成（AI 可能产出不稳定）。\n\n建议先手动生成大纲后再写作。\n\n是否仍要继续？');
    if (!go) return;
  }
  const log = document.getElementById('write-log');
  if (log) log.innerHTML = '<div class="loading" style="padding:12px">正在写作，请耐心等待（每章约 1-3 分钟）...</div>';
  toast('正在使用管线写作...', 'loading');
  // 如果填了风格，先保存到书籍配置
  const styleVal = document.getElementById('qw-style-override')?.value?.trim();
  if (styleVal) {
    try { await api(`/books/${currentBook.id}/config`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ style_guide: styleVal }) }); } catch(e) {}
  }
  try {
    const res = await api(`/action/write?book_id=${encodeURIComponent(currentBook.id)}&count=${count}`, {
      method: 'POST',
    });
    if (res.ok) { toast('写作完成', true); await loadBookData(); loadStep5(); }
    else { toast('写作失败', false); if (log) log.innerHTML = `<div style="font-size:12px;color:var(--red);white-space:pre-wrap;max-height:200px;overflow-y:auto">${res.stderr||res.stdout||'未知错误'}</div>`; }
  } catch (e) { toast('请求失败: ' + e.message, false); }
}

async function continueWriting() {
  if (!currentBook) return;
  const extraCount = prompt('要续写多少章？', '10');
  if (!extraCount) return;
  toast('AI 正在生成续写章节大纲，请耐心等待...', 'loading');
  try {
    const res = await api(`/books/${currentBook.id}/continue-writing`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ extra_chapters: parseInt(extraCount) || 10 }),
    });
    if (!res.ok) { toast(res.detail || '续写失败', false); return; }
    chapterOutlinesCache = res.outlines;
    bookData.chapterOutlines = res.outlines;
    await loadBookData();
    const modeTip = res.mode === 'outline_driven'
      ? `（基于 ${res.uncovered_sequences} 个新序列联动续写）`

async function doImportChapters() {
  const fileInput = document.getElementById('import-file');
  const textArea = document.getElementById('import-text');
  let text = textArea.value;
  if (!text && fileInput.files.length) {
    text = await fileInput.files[0].text();
  }
  if (!text.trim()) return toast('请选择文件或粘贴文本', false);
  const startCh = parseInt(document.getElementById('import-start-ch').value) || 1;
  const form = new FormData();
  form.append('text', text);
  form.append('start_chapter', startCh);
  toast('正在导入章节...', 'loading');
  try {
    const res = await fetch(`/api/books/${currentBook.id}/import-chapters`, { method: 'POST', body: form });
    const data = await res.json();
    if (data.ok) {
      toast(`成功导入 ${data.imported} 章`, true);
      document.getElementById('modal-import')?.remove();
      await loadBookData(); loadStep5();
    } else { toast(data.detail || '导入失败', false); }

async function doExtractFromNovel() {
  const fileInput = document.getElementById('import-file');
  const textArea = document.getElementById('import-text');
  let text = textArea.value;
  if (!text && fileInput.files.length) {
    text = await fileInput.files[0].text();
  }
  if (!text.trim()) return toast('请选择文件或粘贴文本', false);
  const genre = document.getElementById('import-genre')?.value || '玄幻';
  toast('AI 正在分析文本，提取世界观...', 'loading');
  try {
    const res = await api(`/books/${currentBook.id}/extract-from-novel`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text: text.substring(0, 15000), genre }),
    });
    if (!res.ok) { toast(res.error || '提取失败', false); return; }
    window._aiResult = res.data;

    step3Mode = 'form'; loadStep3Form(window._aiResult);

  } catch (e) { toast('提取失败: ' + e.message, false); }

window._auditTab = 'audit'; // 'audit' | 'story' | 'edit'

    <div style="display:flex;gap:20px;max-width:1200px;margin:0 auto">

            </select>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:8px">

            <button class="btn btn-warning" onclick="doRevise()">&#128295; 自动修订</button>
          </div>
          <!-- 标签页切换 -->
          <div class="mode-tabs" style="margin-bottom:8px">

        <div class="card" id="story-data-panel" style="display:none">

          <div id="story-data-content"><div class="loading">加载中...</div></div>

function switchAuditTab(tab, el) {
  window._auditTab = tab;
  document.querySelectorAll('#step6-panel .mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

async function saveEditedContent(kind) {

async function aiRewriteSegment() {
  const body = document.getElementById('chapter-text-body');
  const selected = body ? body.value.substring(body.selectionStart, body.selectionEnd).trim() : '';
  if (!selected) return toast('请先在正文中选中需要修改的段落', false);
  const instruction = document.getElementById('edit-instruction')?.value?.trim();
  if (!instruction) return toast('请输入修改指令', false);
  const ch = parseInt(document.getElementById('audit-chapter').value);
  const resultDiv = document.getElementById('rewrite-result');
  resultDiv.innerHTML = '<div class="loading">AI 正在修改...</div>';
  try {
    const fullText = body.value;
    const selStart = fullText.indexOf(selected);
    const before = selStart > 0 ? fullText.substring(0, selStart) : '';
    const after = selStart >= 0 ? fullText.substring(selStart + selected.length) : '';
    const res = await api(`/books/${currentBook.id}/ai-rewrite-segment`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chapter: ch, original_text: selected, instruction, context_before: before, context_after: after }),
    });
    if (!res.ok) { resultDiv.innerHTML = `<div class="error">修改失败</div>`; return; }
    const rewritten = res.rewritten || '';
    resultDiv.innerHTML = `
      <div style="margin-bottom:8px;font-size:11px;font-weight:600;color:var(--green)">修改结果：</div>
      <div style="padding:8px;background:var(--bg-dark);border-radius:4px;font-size:12px;white-space:pre-wrap;max-height:200px;overflow-y:auto;border-left:3px solid var(--green)">${esc(rewritten)}</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-sm btn-success" onclick="applyRewrite()">应用修改</button>
        <button class="btn btn-sm" onclick="document.getElementById('rewrite-result').innerHTML=''">取消</button>
      </div>`;
    window._rewriteData = { selected, rewritten, selStart };
  } catch (e) { resultDiv.innerHTML = `<div class="error">${e.message}</div>`; }
}

function applyRewrite() {
  if (!window._rewriteData) return;
  const body = document.getElementById('chapter-text-body');
  if (!body) return;
  const idx = body.value.indexOf(window._rewriteData.selected);
  if (idx < 0) return toast('未找到选中文本位置', false);
  body.value = body.value.substring(0, idx) + window._rewriteData.rewritten + body.value.substring(idx + window._rewriteData.selected.length);
  toast('已应用修改，请点击"保存正文"确认', true);
  document.getElementById('rewrite-result').innerHTML = '';
}

async function loadStoryData() {
  const panel = document.getElementById('story-data-content');
  panel.innerHTML = '<div class="loading">加载中...</div>';
  try {
    // 逐个请求，单个失败不影响其他
    let hooksArr = [], causalArr = [], emotions = {}, relsArr = [], charMap = {};
    try { const r = await api(`/books/${currentBook.id}/hooks`); hooksArr = Array.isArray(r) ? r : []; } catch(e) { console.warn('hooks API failed:', e); }
    try { const r = await api(`/books/${currentBook.id}/causal-chain`); causalArr = Array.isArray(r) ? r : []; } catch(e) { console.warn('causal API failed:', e); }
    try { const r = await api(`/books/${currentBook.id}/emotional-arcs`); emotions = r || {}; } catch(e) { console.warn('emotions API failed:', e); }
    try { const r = await api(`/books/${currentBook.id}/relationships`); relsArr = Array.isArray(r) ? r : []; } catch(e) { console.warn('rels API failed:', e); }
    // 加载角色列表建立 ID→名称映射
    try {

function renderLocalEmotions(emotions, charMap) {
