  if (!chars.length) return '<div style="font-size:12px;color:var(--text3);padding:8px;background:var(--bg2);border-radius:4px">暂无情感弧线</div>';
  const idToName = {};
  chars.forEach(c => {
    idToName[c] = charMap[c] || (emotions[c]||[])[0]?.character_name || c;
  });
  window._localEmotions = emotions;
  window._emotionIdToName = idToName;
  let html = '<div class="toolbar" style="margin-bottom:8px">' + chars.map(c => `<button class="btn btn-sm" onclick="drawLocalArc('${c}')">${idToName[c]}</button>`).join('') + '</div>';
  html += '<canvas class="arc-canvas" id="audit-arc-canvas"></canvas>';
  return html;
}

function drawLocalArc(charId) {
  const data = (window._localEmotions || {})[charId] || [];
  if (!data.length) return;
  const canvas = document.getElementById('audit-arc-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth; const H = 180;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  const maxCh = Math.max(...data.map(d => d.chapter || 0), 10);
  const pad = { l: 40, r: 16, t: 14, b: 28 };
  const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
  ctx.strokeStyle = 'rgba(100,100,100,.2)'; ctx.lineWidth = .5;
  for (let i = 0; i <= 5; i++) { const y = pad.t + cH * i / 5; ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cW, y); ctx.stroke(); }
  const col = '#58a6ff';
  ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.beginPath();
  data.forEach((d, i) => { const x = pad.l + ((d.chapter||0)/maxCh)*cW; const y = pad.t + cH*(1-(d.intensity||5)/10); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();
  ctx.fillStyle = col;
  data.forEach(d => { const x = pad.l+((d.chapter||0)/maxCh)*cW; const y = pad.t+cH*(1-(d.intensity||5)/10); ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill(); });
}

function renderAuditResult(res) {
  const panel = document.getElementById('audit-result-panel');
  const layers = res.layers || {};
  let html = `<div class="card">
    <div class="card-header">&#128269; 审计报告 — 第${res.chapter}章</div>
    <div style="padding:10px 14px;border-radius:6px;margin-bottom:12px;background:${res.passed?'var(--green-bg)':'var(--red-bg)'};color:${res.passed?'var(--green)':'var(--red)'};font-size:13px;font-weight:600">${res.summary}</div>`;

  const layerNames = { language: '&#128172; 语言层', structure: '&#127959; 结构层', drama: '&#127917; 戏剧层' };
  const layerBadges = { language: 'language', structure: 'structure', drama: 'drama' };
  let issueIdx = 0;

  for (const [key, layer] of Object.entries(layers)) {
    const passed = layer.passed;
    const issues = layer.issues || [];
    html += `<div class="audit-layer">
      <div class="audit-layer-header ${passed?'passed':'failed'}" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <span>${layerNames[key] || key}</span>
        <span class="badge badge-${layerBadges[key]||''}" style="margin-left:8px">${passed?'&#10003; 通过':`&#10007; ${issues.length} 个问题`}</span>
        <span style="margin-left:auto;font-size:11px;cursor:pointer">&#9660;</span>
      </div>
      <div style="${passed?'display:none':''}">
        ${issues.map(iss => {
          const idx = issueIdx++;
          return `
          <div class="audit-issue">
            <span class="severity severity-${iss.severity||'warning'}">${iss.severity==='critical'?'严重':'警告'}</span>
            <div style="flex:1">
              <div style="font-weight:500">${esc(iss.dimension||'')}</div>
              <div style="color:var(--text2);margin-top:2px">${esc(iss.description||'')}</div>
              ${iss.suggestion?`<div style="color:var(--text3);margin-top:2px;font-style:italic">建议：${esc(iss.suggestion)}</div>`:''}
              ${iss.excerpt?`<div style="color:var(--text3);margin-top:4px;padding:6px;background:var(--bg-dark);border-radius:4px;font-size:11px">...${esc(iss.excerpt)}...</div>`:''}
              <button class="btn btn-sm" style="margin-top:6px;font-size:10px" onclick="applyIssueFix(${idx})">&#10024; AI 修复此问题</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  html += '</div>';
  panel.innerHTML = html;

  // 存储问题数据供 AI 修复使用
  window._auditIssues = [];
  for (const layer of Object.values(layers)) {
    for (const iss of (layer.issues || [])) {
      window._auditIssues.push(iss);
    }
  }
}

async function applyIssueFix(idx) {
  const iss = window._auditIssues?.[idx];
  if (!iss) return;
  toast('正在 AI 修复...', 'loading');
  const ch = parseInt(document.getElementById('audit-chapter').value);
  const instruction = `${iss.dimension}：${iss.description}。${iss.suggestion ? '建议：' + iss.suggestion : ''}`;
  try {
    // 读取当前正文
    const chRes = await api(`/books/${currentBook.id}/chapters/${ch}`);
    const fullText = chRes.content;
    let context = fullText;
    // 尝试定位 excerpt
    let original = iss.excerpt || '';
    let before = '', after = '';
    if (original) {
      const pos = fullText.indexOf(original);
      if (pos >= 0) {
        before = fullText.substring(0, pos);
        after = fullText.substring(pos + original.length);
      }
    }
    const res = await api(`/books/${currentBook.id}/ai-rewrite-segment`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ chapter: ch, original_text: original || fullText.substring(0, 500), instruction, context_before: before, context_after: after }),
    });
    if (!res.ok) { toast('修复失败', false); return; }
    toast('修复完成，请检查正文', true);
    // 如果能定位 excerpt，直接替换
    if (original) {
      const chRes2 = await api(`/books/${currentBook.id}/chapters/${ch}`);
      const newText = chRes2.content.replace(original, res.rewritten);
      if (newText !== chRes2.content) {
        await api(`/books/${currentBook.id}/chapters/${ch}/content`, {
          method: 'PUT', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ content: newText, kind: chRes2.kind }),
        });
        toast('修复已自动应用到正文', true);
        await loadBookData();
      }
    }
  } catch (e) { toast('修复失败: ' + e.message, false); }
}

async function doRevise() {

}

}

function renderCausal() {
  if (!bookData || !bookData.causal.length) return '<div class="empty">暂无因果链</div>';
  return bookData.causal.map(l => `<div class="causal-node"><div class="causal-ch">Ch.${l.chapter}</div><div><div style="font-size:12px">${esc(l.event||'-')}</div><div style="font-size:11px;color:var(--text3)">导致：${esc(l.consequence||'-')}</div></div></div>`).join('');
}

function renderRelations() {
  if (!bookData || !bookData.relations.length) return '<div class="empty">暂无关系数据</div>';
  return bookData.relations.map(r => {
    const pct = ((r.strength+100)/200*100).toFixed(0);
    const col = r.strength>=0?'var(--green)':'var(--red)';
    return `<div class="rel-item"><span style="min-width:48px;font-size:12px">${esc(r.character_a)}</span><span style="min-width:40px;font-size:10px;color:var(--text3)">${esc(r.type||'-')}</span><span style="min-width:48px;font-size:12px">${esc(r.character_b)}</span><div class="rel-bar-wrap"><div class="rel-bar" style="width:${pct}%;background:${col}"></div></div><span style="font-size:11px;color:${col}">${r.strength>0?'+':''}${r.strength||0}</span></div>`;
  }).join('');
}

function renderEmotions() {
  if (!bookData) return '<div class="empty">无数据</div>';
  const chars = Object.keys(bookData.emotions);
  if (!chars.length) return '<div class="empty">暂无情感弧线</div>';
  const nameMap = window._emotionIdToName || {};
  return `<div class="toolbar">${chars.map(c => `<button class="btn btn-sm" onclick="drawArc('${c}')">${nameMap[c]||c}</button>`).join('')}</div><canvas class="arc-canvas" id="arc-canvas"></canvas>`;
}

function drawArc(charId) {
  if (!bookData) return;
  const data = bookData.emotions[charId] || [];
  if (!data.length) return;
  const canvas = document.getElementById('arc-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth; const H = 180;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  const maxCh = bookData.book.target_chapters || 90;
  const pad = { l: 40, r: 16, t: 14, b: 28 };
  const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
  ctx.strokeStyle = 'rgba(100,100,100,.2)'; ctx.lineWidth = .5;
  for (let i = 0; i <= 5; i++) { const y = pad.t + cH * i / 5; ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l + cW, y); ctx.stroke(); }
  const colors = ['#3fb950','#bc8cff','#d29922','#f85149','#58a6ff','#f0883e'];
  const ci = Object.keys(bookData.emotions).indexOf(charId) % 6;
  const col = colors[ci];
  ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.beginPath();
  data.forEach((d, i) => { const x = pad.l + ((d.chapter||0)/maxCh)*cW; const y = pad.t + cH*(1-(d.intensity||5)/10); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();
  ctx.fillStyle = col;
  data.forEach(d => { const x = pad.l+((d.chapter||0)/maxCh)*cW; const y = pad.t+cH*(1-(d.intensity||5)/10); ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill(); });
}

// ── 设置页面 ──────────────────────────────────────────────────────────────

async function loadSettingsPage() {
  const s = await api('/settings');
  const ol = s.llm_provider === 'ollama';
  const isCustom = !['deepseek','ollama'].includes(s.llm_provider);
  document.getElementById('settings-page-panel').innerHTML = `
    <div style="max-width:600px;margin:0 auto">
      <div class="card">
        <div class="card-header">&#9881; API 配置</div>
        <div class="mode-tabs" style="flex-wrap:wrap" data-provider="${s.llm_provider}">
          <div class="mode-tab ${!ol&&!isCustom?'active':''}" onclick="switchSP('deepseek',this)">DeepSeek</div>
          <div class="mode-tab ${ol?'active':''}" onclick="switchSP('ollama',this)">Ollama</div>
          <div class="mode-tab ${s.llm_provider==='openai'?'active':''}" onclick="switchSP('openai',this)">OpenAI</div>
          <div class="mode-tab ${s.llm_provider==='zhipu'?'active':''}" onclick="switchSP('zhipu',this)">智谱GLM</div>
          <div class="mode-tab ${s.llm_provider==='moonshot'?'active':''}" onclick="switchSP('moonshot',this)">Moonshot</div>
          <div class="mode-tab ${s.llm_provider==='qwen'?'active':''}" onclick="switchSP('qwen',this)">通义千问</div>
          <div class="mode-tab ${isCustom?'active':''}" onclick="switchSP('custom',this)">自定义</div>
        </div>
        <div id="sp-deepseek" style="${ol||isCustom?'display:none':''}">
          <div class="form-group"><label class="form-label">API Key *</label><input class="form-input" id="sp-ds-key" type="password" value="${s.deepseek_api_key}"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Base URL</label><input class="form-input" id="sp-ds-url" value="${s.deepseek_base_url}"></div>
            <div class="form-group"><label class="form-label">模型</label><input class="form-input" id="sp-ds-model" value="${s.deepseek_model}"></div>
          </div>
        </div>
        <div id="sp-ollama" style="${ol?'':'display:none'}">
          <div class="form-row">
            <div class="form-group"><label class="form-label">地址</label><input class="form-input" id="sp-ol-url" value="${s.ollama_base_url}"></div>
            <div class="form-group"><label class="form-label">模型</label><input class="form-input" id="sp-ol-model" value="${s.ollama_model}"></div>
          </div>
        </div>
        <div id="sp-custom" style="${isCustom?'':'display:none'}">
          <div class="form-desc">配置任意 OpenAI 兼容接口</div>
          <div class="form-group"><label class="form-label">API Key *</label><input class="form-input" id="sp-cust-key" type="password" value="${s.custom_api_key||''}"></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Base URL *</label><input class="form-input" id="sp-cust-url" value="${s.custom_base_url||''}"></div>
            <div class="form-group"><label class="form-label">模型 *</label><input class="form-input" id="sp-cust-model" value="${s.custom_model||''}"></div>
          </div>
        </div>
        <div class="form-row" style="margin-top:12px">
          <div class="form-group"><label class="form-label">默认温度</label><input class="form-input" id="sp-temp" type="number" step="0.1" value="${s.default_temperature}"></div>
          <div class="form-group"><label class="form-label">审计模型</label><input class="form-input" id="sp-auditor" value="${s.auditor_model||''}" placeholder="留空用主模型"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-primary" onclick="saveSettingsFromPage()">保存</button>
          <button class="btn" onclick="goStep(currentStep)">返回</button>
        </div>
      </div>
    </div>`;
}

function switchSP(p, el) {
  el.parentElement.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  el.parentElement.dataset.provider = p;
  const isOpenAICompatible = !['deepseek','ollama'].includes(p);
  document.getElementById('sp-deepseek').style.display = p === 'deepseek' ? '' : 'none';
  document.getElementById('sp-ollama').style.display = p === 'ollama' ? '' : 'none';
  document.getElementById('sp-custom').style.display = isOpenAICompatible ? '' : 'none';
}

async function saveSettingsFromPage() {
  // 从 data-provider 读取当前选择（可靠方式）
  const tabs = document.querySelector('#settings-page-panel .mode-tabs');
  const provider = tabs && tabs.dataset.provider ? tabs.dataset.provider : 'deepseek';
  const isOllama = provider === 'ollama';
  const isOpenAICompatible = !isOllama && provider !== 'deepseek';
  await api('/settings', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      llm_provider: provider,
      deepseek_api_key: document.getElementById('sp-ds-key').value,
      deepseek_base_url: document.getElementById('sp-ds-url').value,
      deepseek_model: document.getElementById('sp-ds-model').value,
      ollama_base_url: document.getElementById('sp-ol-url').value,
      ollama_model: document.getElementById('sp-ol-model').value,
      default_temperature: document.getElementById('sp-temp').value,
      auditor_model: document.getElementById('sp-auditor').value,
      custom_base_url: isOpenAICompatible ? document.getElementById('sp-cust-url').value : '',
      custom_api_key: isOpenAICompatible ? document.getElementById('sp-cust-key').value : '',
      custom_model: isOpenAICompatible ? document.getElementById('sp-cust-model').value : '',
    }),
  });
  apiConfigured = true; apiProvider = provider;
  updateStepsBar(); toast('设置已保存', true);
}

// ── 初始化 ────────────────────────────────────────────────────────────────

(async function init() {
  try {
    let status;
    try { status = await api('/settings/status'); } catch { status = { configured: false, provider: 'deepseek' }; }
    apiConfigured = status.configured; apiProvider = status.provider;
    currentStep = apiConfigured ? 2 : 1; maxUnlockedStep = 7;
    await loadBooks();
    const maxStage = allBooks.reduce((m, b) => Math.max(m, b.stage || 0), 0);
    updateStepsBar();
    const bestBook = allBooks.reduce((best, b) => (!best || (b.stage||0) > (best.stage||0)) ? b : best, null);
    if (bestBook) {
      await selectBookAndLoad(bestBook.id);
      if (maxStage >= 4) goStep(5);
      else if (maxStage >= 3) goStep(4);
      else if (maxStage >= 2) goStep(3);
      else goStep(2);
    } else goStep(2);
  } catch (e) {
    console.error('初始化失败:', e);
    apiConfigured = false; updateStepsBar();
    document.getElementById('s-step1').style.display = '';
    goStep(1); loadStep1();
  }
})();
</script>
